map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
server {
    listen       80;
    server_name  tentacle.pro;
    return 301 https://tentacle.pro$request_uri;
}
server {
    listen       80;
    server_name  www.tentacle.pro;
    return 301 https://tentacle.pro$request_uri;
}
server {
    listen       443 ssl;
    server_name  www.tentacle.pro;
    ssl_certificate       '/root/.acme.sh/*.tentacle.pro_ecc/fullchain.cer';
    ssl_certificate_key   '/root/.acme.sh/*.tentacle.pro_ecc/*.tentacle.pro.key';
    return 301 https://tentacle.pro$request_uri;
}

server {
    listen 443 ssl;
    # http2 on;
    server_name tentacle.pro;

    ssl_certificate       '/root/.acme.sh/*.tentacle.pro_ecc/fullchain.cer';
    ssl_certificate_key   '/root/.acme.sh/*.tentacle.pro_ecc/*.tentacle.pro.key';
    ssl_session_timeout 5m;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE:ECDH:AES:HIGH:!NULL:!aNULL:!MD5:!ADH:!RC4;
    #ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE:ECDH:AES:HIGH:!NULL:!aNULL:!MD5:!ADH:!RC4:!DH:!DHE;
    ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
    ssl_prefer_server_ciphers on;

    # 安全响应头
    add_header X-Frame-Options        SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy        strict-origin-when-cross-origin;

    # Bun 静态资源缓存（hash 文件名，永久缓存）
    location ~* ^/_bun/asset/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        expires            1y;
        add_header         Cache-Control "public, immutable";
    }

    # 主应用反向代理
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持（HMR 开发模式 / 未来 WS 功能）
        proxy_set_header Upgrade    $http_upgrade;
        # proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}