upstream api {
    server 127.0.0.1:3001 weight=10 max_fails=3 fail_timeout=10s;
}
# 信任的代理服务器IP列表
set_real_ip_from 10.0.0.0/8;
set_real_ip_from 172.16.0.0/12;
set_real_ip_from 192.168.0.0/16;
# 如果你使用了CDN或其他已知的代理，也应该将它们的IP范围添加到这里
# set_real_ip_from X.X.X.X/X;
# 指定包含真实IP的请求头
real_ip_header X-Forwarded-For;
# 从右向左处理X-Forwarded-For中的IP
real_ip_recursive on;

server {
    listen 80;
    server_name api.tentacle.pro;
    return 301 https://$host$request_uri;
}

server {
    listen       443 ssl;
    # http2 on;
    server_name  api.tentacle.pro;
    ssl_certificate       '/root/.acme.sh/*.tentacle.pro_ecc/fullchain.cer';
    ssl_certificate_key   '/root/.acme.sh/*.tentacle.pro_ecc/*.tentacle.pro.key';
    ssl_session_timeout 5m;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE:ECDH:AES:HIGH:!NULL:!aNULL:!MD5:!ADH:!RC4:!DH:!DHE;
    ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
    ssl_prefer_server_ciphers on;
    add_header X-Frame-Options        DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy        strict-origin-when-cross-origin;
    # 上传文件大小限制（封面图 + 正文插图）
    client_max_body_size 20m;
    access_log /var/log/nginx/api.tentacle.pro.access.log;
    error_log  /var/log/nginx/api.tentacle.pro.error.log;

    # 静态素材文件（assets/）
    location /assets/ {
        proxy_pass         http://api;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        expires            7d;
        add_header         Cache-Control "public";
    }

    location / {
        proxy_pass http://api;
        proxy_http_version 1.1;
        # proxy_redirect     off;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        proxy_max_temp_file_size 0;
        proxy_connect_timeout      30s;
        proxy_send_timeout         90s;
        proxy_read_timeout         90s;
        proxy_buffer_size          4k;
        proxy_buffers              4 32k;
        proxy_busy_buffers_size    64k;
        proxy_temp_file_write_size 64k;
    }
    location ~* \.(js|css|png|jpg|jpeg|gif|ico)$ {
        expires max;
        log_not_found off;
    }
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
    location = /robots.txt {
        allow all;
        log_not_found off;
        access_log off;
    }
    location /ip {
        default_type text/plain;
        return 200 $remote_addr;
    }
}
